# Timeout süresi (saniye) — 0 yerine 3-5 saniye daha kullanıcı dostu
set timeout=5
set default=0

# Gereksiz modülleri yüklemeye gerek yok, GRUB genelde otomatik algılıyor
# Ama emin olmak için yaygın olanları tutabiliriz
insmod all_video
insmod gfxterm
insmod font
# Eğer gerçekten legacy VESA/VBE kullanıyorsan vbe ve vga bırak, yoksa kaldırılabilir

# Grafik terminali aç (gfxterm olmadan grafik mod çalışmaz)
if [ "${grub_platform}" = "pc" ]; then
    terminal_output gfxterm
else
    terminal_output console
fi

# Eğer font yüklenebiliyorsa unicode fontu seç (daha güzel görünüm)
if loadfont unicode ; then
    set gfxterm_font=unicode
fi

# Önerilen modern yaklaşım: auto + fallback listesi
set gfxmode=auto
# Alternatif olarak sabit istiyorsan:
# set gfxmode=1280x720x32,1024x768x32,800x600x32,auto

set gfxpayload=keep

# Background resmi istiyorsan (opsiyonel)
# set background_image /boot/grub/splash.png

menuentry "AscentOS 64-bit Unified Kernel v2.0" {
    # multiboot2 ile kernel + modüller
    multiboot2 /boot/kernel64.elf

    # Eğer kernel'in command line parametreleri varsa buraya ekle
    # Örnek:
    # module2 /boot/initrd.img root=UUID=xxxx rw quiet splash

    boot
}

# İsteğe bağlı: basit bir recovery / debug girişi
menuentry "AscentOS — Debug / Safe Mode" {
    multiboot2 /boot/kernel64.elf debug earlyprintk=vga
    boot
}