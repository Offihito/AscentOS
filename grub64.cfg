set timeout=5
set timeout_style=menu
set default=0

# Video modüllerini yükle
insmod all_video
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod font

# 1920x1080 grafik modu
set gfxmode=1920x1080x32,1280x720x32,800x600x32,auto
set gfxpayload=text
terminal_output gfxterm

menuentry "AscentOS 64-bit Unified Kernel v2.0" {
    multiboot2 /boot/kernel64.elf
    boot
}

menuentry "AscentOS - Recovery Mode" {
    multiboot2 /boot/kernel64.elf single init=/bin/sh
    boot
}

menuentry "GRUB Command Line (Debug)" {
    terminal_input console
    terminal_output console
}